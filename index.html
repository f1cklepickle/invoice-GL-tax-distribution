<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Tax Distribution Program</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <div class="masterContainer">
      <div class="mainContentContainer">
        <header class="toolbarContainer" aria-label="Application tools">
          <span class="profile">Profile</span>
          <span class="settings">Settings</span>
          <span class="shortcuts">Shortcuts</span>
        </header>

        <main>
          <section class="invoiceSearchContainer" aria-label="Invoice summary and search">
            <div class="invoiceDetailsContainer">
              <div class="totalContainer">
                <label for="inputTotal">Invoice Total:</label>
                <input type="text" id="inputTotal">
                <span id="invoice-total"></span>
              </div>

              <p><strong>Subtotal:</strong> <span id="subtotal"></span></p>
              <p><strong>Tax:</strong> <span id="tax"></span></p>
              <p id="adjustment-note" class="adjustmentNote"></p>
            </div>

            <div class="searchBoxContainer">
              <div class="searchContainer">
                <label for="inputSearch">Search item cost:</label>
                <input type="text" id="inputSearch">
                <button class="searchBtn" type="button">Search</button>
              </div>
              <div class="resultsContainer" aria-live="polite">Search Results</div>
            </div>
          </section>

          <section class="enterItemContainer" aria-label="Add invoice line item">
            <div class="entryField">
              <label for="inputGl">Enter GL Number:</label>
              <input type="text" id="inputGl">
            </div>

            <div class="entryField">
              <label for="inputCost">Enter Item Cost:</label>
              <input type="text" id="inputCost">
            </div>

            <div class="entryField">
              <label for="inputName">Enter Item Name: <span>(Optional)</span></label>
              <input type="text" id="inputName">
            </div>
          </section>

          <section class="detailsBorder" aria-label="GL details">
            <div class="detailsAccent">GL Details</div>
            <div id="detailsContentContainer">
              <aside id="bookmarkList" aria-label="GL bookmarks">
                <ul id="marksExtra"></ul>
              </aside>

              <div id="detailsContainer">
                <table id="gl-table"></table>
              </div>
            </div>

            <button id="add-item-button" type="button" onclick="addNewGl()">Add New Item</button>
          </section>
        </main>
      </div>

      <footer class="footer">
        <span>Created - 2025</span>
        <span>Source code & Github profile: <a href="https://github.com/f1cklepickle" rel="noopener noreferrer" target="_blank">Harrison Bruhl</a></span>
      </footer>
    </div>

    <script src="src/calculations.js"></script>
    <script src="script.js"></script>
  </body>
</html>
